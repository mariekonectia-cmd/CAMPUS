{% extends "base.html" %}

{% block content %}
<div style="max-width:420px; margin:40px auto; text-align:left">
    <h2>Login Administrador</h2>
    {% if error %}
        <div style="background:#f8d7da;padding:10px;border-radius:6px;color:#842029;margin-bottom:12px">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('admin_login') }}">
        <div style="margin-bottom:8px">
            <label>Usuario</label><br>
            <input type="text" name="user" required style="width:100%;padding:8px;border-radius:6px;border:1px solid #ddd">
        </div>
        <div style="margin-bottom:8px">
            <label>Contraseña</label><br>
            <input type="password" name="password" required style="width:100%;padding:8px;border-radius:6px;border:1px solid #ddd">
        </div>
        <div style="text-align:right">
            <button type="submit" style="padding:10px 16px;border-radius:6px;background:#667eea;color:#fff;border:none">Entrar</button>
        </div>
    </form>
</div>
{% endblock %}
